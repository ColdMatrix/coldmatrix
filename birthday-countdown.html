<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Countdown — ColdMatrix Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0F14; --surface: #12181F; --border: #2A3540;
      --text: #EAEDF0; --muted: #8B98A5; --accent: #4FC3F7;
      --gradient: linear-gradient(135deg, #4FC3F7, #2196F3);
      --fun: #FFD700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.6; padding: 20px; }
    .container { max-width: 800px; margin: 40px auto; }
    
    .birthday-card {
      background: linear-gradient(rgba(10, 15, 20, 0.75), rgba(10, 15, 20, 0.85)), url('birthday_calc.jpg');
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255, 107, 138, 0.4);
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(255, 107, 138, 0.2);
    }

    .birthday-card h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    .birthday-card p {
      color: #EAEDF0;
      font-size: 1rem;
      margin-bottom: 24px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .input-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    input[type="date"] {
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(18, 24, 31, 0.9);
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      background: var(--gradient);
      color: #0A0F14;
      border: none;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 12px;
      margin-top: 25px;
      margin-bottom: 25px;
    }

    .time-box {
      background: rgba(18, 24, 31, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px 10px;
      backdrop-filter: blur(5px);
    }

    .time-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--fun);
    }

    .time-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .extra-info {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #d0d6dc;
      background: rgba(10, 15, 20, 0.6);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .back-link {
      display: inline-block;
      margin-top: 25px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="birthday-card" id="birthday-card">
      <h1> Birthday Countdown</h1>
      <p> Select a birthdate to launch the live countdown, see turning age, zodiac sign, and custom celebration wishes!</p>
      
      <div class="input-group">
        <input type="date" id="bdayInput">
        <button class="btn" onclick="startCountdownTimer()">Start Countdown</button>
      </div>

      <div id="resultArea" style="display:none;">
        <div class="countdown-grid">
          <div class="time-box">
            <div class="time-value" id="days">00</div>
            <div class="time-label">Days</div>
          </div>
          <div class="time-box">
            <div class="time-value" id="hours">00</div>
            <div class="time-label">Hours</div>
          </div>
          <div class="time-box">
            <div class="time-value" id="minutes">00</div>
            <div class="time-label">Minutes</div>
          </div>
          <div class="time-box">
            <div class="time-value" id="seconds">00</div>
            <div class="time-label">Seconds</div>
          </div>
        </div>
        <div class="extra-info" id="extraInfo"></div>
      </div>
    </div>

    <div style="text-align: center;">
      <a href="https://coldmatrixtools.com/" class="back-link"> Back to ColdMatrix Tools</a>
    </div>
  </div>

  <script>
    let timerInterval;

    function getZodiacSign(day, month) {
      const signs = [
        { name: "Capricorn ", start: [1,1], end: [1,19] },
        { name: "Aquarius ", start: [1,20], end: [2,18] },
        { name: "Pisces ", start: [2,19], end: [3,20] },
        { name: "Aries ", start: [3,21], end: [4,19] },
        { name: "Taurus ", start: [4,20], end: [5,20] },
        { name: "Gemini ", start: [5,21], end: [6,20] },
        { name: "Cancer ", start: [6,21], end: [7,22] },
        { name: "Leo ", start: [7,23], end: [8,22] },
        { name: "Virgo ", start: [8,23], end: [9,22] },
        { name: "Libra ", start: [9,23], end: [10,22] },
        { name: "Scorpio ", start: [10,23], end: [11,21] },
        { name: "Sagittarius ", start: [11,22], end: [12,21] },
        { name: "Capricorn ", start: [12,22], end: [12,31] }
      ];
      for (let sign of signs) {
        if ((month === sign.start[0] && day >= sign.start[1]) || (month === sign.end[0] && day <= sign.end[1])) {
          return sign.name;
        }
      }
      return "Unknown";
    }

    function startCountdownTimer() {
      const inputVal = document.getElementById('bdayInput').value;
      const resultArea = document.getElementById('resultArea');
      
      if (!inputVal) {
        alert(" Please select a valid birthdate first!");
        return;
      }

      resultArea.style.display = "block";
      clearInterval(timerInterval);

      const bdayDate = new Date(inputVal);
      const bMonth = bdayDate.getMonth() + 1;
      const bDay = bdayDate.getDate();
      const bYear = bdayDate.getFullYear();

      function updateTimer() {
        const now = new Date();
        let targetYear = now.getFullYear();
        let nextBday = new Date(targetYear, bMonth - 1, bDay);

        if (now > nextBday) {
          nextBday.setFullYear(targetYear + 1);
          targetYear++;
        }

        const turningAge = targetYear - bYear;
        const diff = nextBday - now;

        if (diff <= 0) {
          document.getElementById('days').innerText = "00";
          document.getElementById('hours').innerText = "00";
          document.getElementById('minutes').innerText = "00";
          document.getElementById('seconds').innerText = "00";
          document.getElementById('extraInfo').innerHTML = " <strong>Happy Birthday!</strong> Wishing you a wonderful and joyful day filled with success and happiness! ";
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById('days').innerText = String(days).padStart(2, '0');
        document.getElementById('hours').innerText = String(hours).padStart(2, '0');
        document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
        document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');

        const zodiac = getZodiacSign(bDay, bMonth);
        document.getElementById('extraInfo').innerHTML = ` Turning <strong>${turningAge}</strong> years old &nbsp;|&nbsp; Zodiac Sign: <strong>${zodiac}</strong>`;
      }

      updateTimer();
      timerInterval = setInterval(updateTimer, 1000);
    }
  </script>

</body>
</html>
